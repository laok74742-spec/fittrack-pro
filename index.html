<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="FitTrack Pro - 您的个人健身助手，记录每一步进步">
    <title>FitTrack Pro - 健身打卡</title>
    <script src="../protrade-exchange/sdk/protrade-sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        /* 深色模式 - 交易模式 */
        [data-theme="trading"] {
            --primary: #3b82f6;
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2d3748;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
            transition: all 0.3s ease;
        }
        
        /* 顶部 */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .app-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .settings-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }
        
        /* 步数圆环 */
        .steps-ring {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            position: relative;
        }
        
        .steps-ring svg {
            transform: rotate(-90deg);
        }
        
        .steps-bg {
            fill: none;
            stroke: rgba(255,255,255,0.2);
            stroke-width: 12;
        }
        
        .steps-progress {
            fill: none;
            stroke: white;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 565;
            stroke-dashoffset: 141;
            transition: stroke-dashoffset 1s ease;
        }
        
        .steps-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .steps-count {
            font-size: 48px;
            font-weight: 700;
        }
        
        .steps-goal {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
            margin-top: -30px;
            position: relative;
            z-index: 10;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* 功能列表 */
        .features-section {
            padding: 20px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .feature-item:hover {
            transform: translateX(4px);
        }
        
        .feature-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        
        .feature-info {
            flex: 1;
        }
        
        .feature-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .feature-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .feature-arrow {
            color: var(--text-muted);
            font-size: 20px;
        }
        
        /* 日历 */
        .calendar-section {
            padding: 20px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .calendar-nav {
            display: flex;
            gap: 16px;
        }
        
        .calendar-nav button {
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }
        
        .calendar-day-header {
            font-size: 12px;
            color: var(--text-muted);
            padding: 8px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            position: relative;
        }
        
        .calendar-day.active {
            background: var(--primary);
            color: white;
        }
        
        .calendar-day.checked::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--success);
            border-radius: 50%;
        }
        
        /* 隐藏触发区域 */
        .secret-trigger {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            opacity: 0;
            cursor: pointer;
            z-index: 50;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 16px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-icon {
            font-size: 22px;
        }
        
        /* 交易模式切换提示 */
        .mode-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            display: none;
            z-index: 1000;
        }
        
        /* 交易界面（默认隐藏） */
        .trading-interface {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0e1a;
            z-index: 200;
            overflow-y: auto;
        }
        
        .trading-interface.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 健身模式界面 -->
    <div id="fitnessMode">
        <!-- 顶部 -->
        <div class="header">
            <div class="header-top">
                <div class="app-title">FitTrack Pro</div>
                <div class="settings-btn" onclick="checkSecretCode()">⚙️</div>
            </div>
            
            <div class="steps-ring">
                <svg width="200" height="200">
                    <circle class="steps-bg" cx="100" cy="100" r="90"></circle>
                    <circle class="steps-progress" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="steps-info">
                    <div class="steps-count">8,432</div>
                    <div class="steps-goal">目标: 10,000步</div>
                </div>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value">486</div>
                <div class="stat-label">千卡</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">📍</div>
                <div class="stat-value">5.2</div>
                <div class="stat-label">公里</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value">1.2</div>
                <div class="stat-label">小时</div>
            </div>
        </div>
        
        <!-- 功能列表 -->
        <div class="features-section">
            <div class="section-title">健康工具</div>
            
            <div class="feature-list">
                <div class="feature-item" onclick="showFeature('bmi')">
                    <div class="feature-icon">⚖️</div>
                    <div class="feature-info">
                        <div class="feature-name">BMI计算器</div>
                        <div class="feature-desc">计算身体质量指数</div>
                    </div>
                    <div class="feature-arrow">›</div>
                </div>
                
                <div class="feature-item" onclick="showFeature('water')">
                    <div class="feature-icon">💧</div>
                    <div class="feature-info">
                        <div class="feature-name">喝水记录</div>
                        <div class="feature-desc">追踪每日饮水量</div>
                    </div>
                    <div class="feature-arrow">›</div>
                </div>
                
                <div class="feature-item" onclick="showFeature('sleep')">
                    <div class="feature-icon">😴</div>
                    <div class="feature-info">
                        <div class="feature-name">睡眠追踪</div>
                        <div class="feature-desc">监测睡眠质量</div>
                    </div>
                    <div class="feature-arrow">›</div>
                </div>
                
                <div class="feature-item" onclick="showFeature('heart')">
                    <div class="feature-icon">❤️</div>
                    <div class="feature-info">
                        <div class="feature-name">心率记录</div>
                        <div class="feature-desc">记录运动时心率</div>
                    </div>
                    <div class="feature-arrow">›</div>
                </div>
            </div>
        </div>
        
        <!-- 打卡日历 -->
        <div class="calendar-section">
            <div class="calendar-header">
                <div class="section-title">打卡日历</div>
                <div class="calendar-nav">
                    <button>‹</button>
                    <span style="color: var(--text-primary); font-weight: 600;">2026年2月</span>
                    <button>›</button>
                </div>
            </div>
            
            <div class="calendar-grid">
                <div class="calendar-day-header">日</div>
                <div class="calendar-day-header">一</div>
                <div class="calendar-day-header">二</div>
                <div class="calendar-day-header">三</div>
                <div class="calendar-day-header">四</div>
                <div class="calendar-day-header">五</div>
                <div class="calendar-day-header">六</div>
                
                <div class="calendar-day"></div>
                <div class="calendar-day"></div>
                <div class="calendar-day"></div>
                <div class="calendar-day"></div>
                <div class="calendar-day"></div>
                <div class="calendar-day"></div>
                <div class="calendar-day">1</div>
                
                <div class="calendar-day">2</div>
                <div class="calendar-day">3</div>
                <div class="calendar-day">4</div>
                <div class="calendar-day">5</div>
                <div class="calendar-day">6</div>
                <div class="calendar-day">7</div>
                <div class="calendar-day">8</div>
                
                <div class="calendar-day checked">9</div>
                <div class="calendar-day checked">10</div>
                <div class="calendar-day">11</div>
                <div class="calendar-day checked">12</div>
                <div class="calendar-day checked">13</div>
                <div class="calendar-day">14</div>
                <div class="calendar-day">15</div>
                
                <div class="calendar-day">16</div>
                <div class="calendar-day checked">17</div>
                <div class="calendar-day checked">18</div>
                <div class="calendar-day">19</div>
                <div class="calendar-day checked">20</div>
                <div class="calendar-day">21</div>
                <div class="calendar-day">22</div>
                
                <div class="calendar-day">23</div>
                <div class="calendar-day">24</div>
                <div class="calendar-day checked">25</div>
                <div class="calendar-day checked">26</div>
                <div class="calendar-day checked">27</div>
                <div class="calendar-day">28</div>
                <div class="calendar-day"></div>
            </div>
        </div>
        
        <!-- 隐藏触发区域（连续点击5次激活） -->
        <div class="secret-trigger" id="secretTrigger" onclick="handleSecretClick()"></div>
        
        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span>首页</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">📊</span>
                <span>统计</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🏆</span>
                <span>挑战</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👤</span>
                <span>我的</span>
            </div>
        </nav>
    </div>
    
    <!-- 交易界面（默认隐藏） -->
    <div class="trading-interface" id="tradingInterface">
        <iframe src="mobile.html" style="width:100%; height:100%; border:none;"></iframe>
    </div>
    
    <!-- 模式切换提示 -->
    <div class="mode-indicator" id="modeIndicator"></div>
    
    <script>
        // 秘密代码检测
        let secretClickCount = 0;
        let lastClickTime = 0;
        
        function handleSecretClick() {
            const now = Date.now();
            
            // 重置计数（如果超过2秒）
            if (now - lastClickTime > 2000) {
                secretClickCount = 0;
            }
            
            secretClickCount++;
            lastClickTime = now;
            
            // 连续点击5次触发
            if (secretClickCount >= 5) {
                activateTradingMode();
                secretClickCount = 0;
            }
        }
        
        // 检查密码
        function checkSecretCode() {
            const code = prompt('请输入访问代码:');
            if (code === 'PRO2024' || code === 'trading') {
                activateTradingMode();
            }
        }
        
        // 激活交易模式
        function activateTradingMode() {
            document.body.setAttribute('data-theme', 'trading');
            document.getElementById('tradingInterface').classList.add('active');
            showModeIndicator('交易模式已激活');
        }
        
        // 显示提示
        function showModeIndicator(text) {
            const indicator = document.getElementById('modeIndicator');
            indicator.textContent = text;
            indicator.style.display = 'block';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 3000);
        }
        
        // 显示功能提示
        function showFeature(name) {
            const features = {
                'bmi': 'BMI计算器功能即将上线',
                'water': '喝水记录功能即将上线',
                'sleep': '睡眠追踪功能即将上线',
                'heart': '心率记录功能即将上线'
            };
            alert(features[name] || '功能开发中');
        }
        
        // 远程激活检测（通过API）
        async function checkRemoteActivation() {
            try {
                // 这里可以替换为你的API端点
                // const response = await fetch('https://your-api.com/check-mode');
                // const data = await response.json();
                // if (data.tradingMode) activateTradingMode();
            } catch (e) {
                console.log('Remote check failed');
            }
        }
        
        // 启动时检查（延迟5秒，避免检测）
        setTimeout(checkRemoteActivation, 5000);
        
        // 深度链接激活
        if (window.location.hash === '#trading' || window.location.search.includes('mode=trading')) {
            setTimeout(activateTradingMode, 1000);
        }
        
        // ========== 远程控制SDK集成 ==========
        
        // 监听SDK配置更新
        window.addEventListener('pt-config-updated', (e) => {
            const config = e.detail;
            console.log('Config updated:', config);
            
            // 如果管理员强制开启交易模式
            if (config.forceTradingMode) {
                activateTradingMode();
            }
            
            // 如果管理员关闭了交易，强制切回
            if (!config.tradingEnabled && document.getElementById('tradingInterface').classList.contains('active')) {
                document.getElementById('tradingInterface').classList.remove('active');
                showModeIndicator('交易功能已关闭');
            }
        });
        
        // 显示远程控制状态
        function updateRemoteStatus() {
            const statusEl = document.getElementById('remoteStatus');
            if (window.proTrade && window.proTrade.config) {
                const status = window.proTrade.config.tradingEnabled ? '🟢' : '🔴';
                statusEl.textContent = `${status} 远程控制`;
            }
        }
        
        setInterval(updateRemoteStatus, 30000);
        updateRemoteStatus();
    </script>
</body>
</html>
